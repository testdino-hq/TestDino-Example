image: mcr.microsoft.com/playwright:v1.59.1-noble

stages:
  - test

variables:
  CI: "true"

playwright:
  stage: test
  script:
    - npm ci
    - npx playwright test
    - npx tdpw upload ./playwright-report --upload-html --token="$TESTDINO_API_KEY"
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    expire_in: 14 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_PIPELINE_SOURCE == "web"
